<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⛽ 주유소 가성비 계산기</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 16px;
    color: #1f2937;
    -webkit-tap-highlight-color: transparent;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  header {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: #fff;
    padding: 24px 20px;
    text-align: center;
  }
  header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  header p { font-size: 13px; opacity: 0.9; }
  main { padding: 20px; }

  /* OCR 업로드 영역 */
  .ocr-section {
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    border: 2px dashed #f59e0b;
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ocr-section:active { transform: scale(0.98); }
  .ocr-section .icon { font-size: 36px; margin-bottom: 8px; }
  .ocr-section .title { font-size: 15px; font-weight: 700; color: #92400e; margin-bottom: 4px; }
  .ocr-section .desc { font-size: 12px; color: #78350f; }
  #fileInput { display: none; }

  /* 진행 상태 */
  .ocr-status {
    background: #eff6ff;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    text-align: center;
    font-size: 13px;
    color: #1e40af;
    display: none;
  }
  .ocr-status.show { display: block; }
  .progress-bar {
    height: 6px;
    background: #dbeafe;
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    width: 0%;
    transition: width 0.3s;
  }

  /* 인식된 주유소 목록 */
  .stations-list { display: none; margin-bottom: 20px; }
  .stations-list.show { display: block; }
  .stations-list h3 { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #4b5563; }
  .station-item {
    background: #f9fafb;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.15s;
  }
  .station-item:active { transform: scale(0.98); }
  .station-item.selected-a { border-color: #3b82f6; background: #eff6ff; }
  .station-item.selected-b { border-color: #ef4444; background: #fef2f2; }
  .station-info { flex: 1; }
  .station-info .dist { font-size: 13px; color: #6b7280; }
  .station-info .price { font-size: 17px; font-weight: 700; color: #111827; margin-top: 2px; }
  .station-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 6px;
    background: #e5e7eb;
    color: #6b7280;
  }
  .station-tag.a { background: #3b82f6; color: #fff; }
  .station-tag.b { background: #ef4444; color: #fff; }
  .selection-hint {
    font-size: 12px;
    color: #6b7280;
    text-align: center;
    margin-top: 8px;
  }

  /* 입력 폼 */
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #4b5563;
    margin-bottom: 6px;
  }
  .input-row { display: flex; gap: 8px; }
  .input-row .form-group { flex: 1; margin-bottom: 0; }
  input[type="number"] {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    font-size: 16px;
    background: #fff;
    transition: border 0.15s;
    -moz-appearance: textfield;
  }
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"]:focus { outline: none; border-color: #4f46e5; }

  .station-card {
    background: #f9fafb;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    border-left: 4px solid #3b82f6;
  }
  .station-card.b { border-left-color: #ef4444; }
  .station-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #111827; }
  .station-card.a h3 { color: #1d4ed8; }
  .station-card.b h3 { color: #b91c1c; }

  /* 계산 버튼 */
  .calc-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    transition: all 0.15s;
  }
  .calc-btn:active { transform: scale(0.98); box-shadow: 0 2px 6px rgba(79, 70, 229, 0.3); }

  /* 결과 영역 */
  .result {
    margin-top: 20px;
    padding: 20px;
    border-radius: 14px;
    display: none;
  }
  .result.show { display: block; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .result.winner-a { background: linear-gradient(135deg, #dbeafe, #bfdbfe); border: 2px solid #3b82f6; }
  .result.winner-b { background: linear-gradient(135deg, #fee2e2, #fecaca); border: 2px solid #ef4444; }
  .result-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    text-align: center;
  }
  .result-winner {
    font-size: 24px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 12px;
  }
  .result.winner-a .result-winner { color: #1d4ed8; }
  .result.winner-b .result-winner { color: #b91c1c; }
  .savings {
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    margin-bottom: 14px;
  }
  .savings .label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
  .savings .amount { font-size: 22px; font-weight: 800; color: #059669; }
  .breakdown { font-size: 12px; }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px dashed rgba(0,0,0,0.1);
  }
  .breakdown-row:last-child { border-bottom: none; font-weight: 700; }
  .breakdown-row .label { color: #4b5563; }
  .breakdown-row .value { color: #111827; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: #9ca3af;
    margin-top: 16px;
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⛽ 주유소 가성비 계산기</h1>
      <p>이동 거리 기름값까지 계산해 진짜 이득인 곳을 찾아드려요</p>
    </header>

    <main>
      <!-- OCR 업로드 -->
      <div class="ocr-section" id="ocrSection">
        <div class="icon">📷</div>
        <div class="title">스크린샷에서 자동 채우기</div>
        <div class="desc">티맵·카카오맵 주유소 목록 화면을 업로드하세요</div>
      </div>
      <input type="file" id="fileInput" accept="image/*">

      <!-- 진행 상태 -->
      <div class="ocr-status" id="ocrStatus">
        <div id="ocrStatusText">준비 중...</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <!-- 인식 결과 목록 -->
      <div class="stations-list" id="stationsList">
        <h3>🔍 인식된 주유소 (비교할 2개 선택)</h3>
        <div id="stationsContainer"></div>
        <div class="selection-hint">탭하여 A(파랑) → B(빨강) 순서로 선택하세요</div>
      </div>

      <!-- 공통 입력 -->
      <div class="input-row">
        <div class="form-group">
          <label>🚗 내 차 연비 (km/L)</label>
          <input type="number" id="efficiency" value="12" step="0.1" inputmode="decimal">
        </div>
        <div class="form-group">
          <label>⛽ 주유할 양 (L)</label>
          <input type="number" id="liters" value="40" step="1" inputmode="decimal">
        </div>
      </div>

      <!-- A 주유소 -->
      <div class="station-card a">
        <h3>🅰️ A 주유소</h3>
        <div class="input-row">
          <div class="form-group">
            <label>거리 (km)</label>
            <input type="number" id="distA" value="6.6" step="0.1" inputmode="decimal">
          </div>
          <div class="form-group">
            <label>리터당 가격 (원)</label>
            <input type="number" id="priceA" value="1955" step="1" inputmode="decimal">
          </div>
        </div>
      </div>

      <!-- B 주유소 -->
      <div class="station-card b">
        <h3>🅱️ B 주유소</h3>
        <div class="input-row">
          <div class="form-group">
            <label>거리 (km)</label>
            <input type="number" id="distB" value="2.9" step="0.1" inputmode="decimal">
          </div>
          <div class="form-group">
            <label>리터당 가격 (원)</label>
            <input type="number" id="priceB" value="1956" step="1" inputmode="decimal">
          </div>
        </div>
      </div>

      <button class="calc-btn" onclick="calculate()">💡 어디가 이득인지 계산하기</button>

      <!-- 결과 -->
      <div class="result" id="result">
        <div class="result-title">🏆 더 합리적인 선택</div>
        <div class="result-winner" id="resultWinner"></div>
        <div class="savings">
          <div class="label">총비용 차이</div>
          <div class="amount" id="savingsAmount"></div>
        </div>
        <div class="breakdown" id="breakdown"></div>
      </div>

      <div class="footer-note">
        ※ 왕복 이동에 드는 기름값을 포함해 계산합니다
      </div>
    </main>
  </div>

<script>
  // ===== 계산 로직 =====
  function calculate() {
    const eff = parseFloat(document.getElementById('efficiency').value);
    const liters = parseFloat(document.getElementById('liters').value);
    const distA = parseFloat(document.getElementById('distA').value);
    const priceA = parseFloat(document.getElementById('priceA').value);
    const distB = parseFloat(document.getElementById('distB').value);
    const priceB = parseFloat(document.getElementById('priceB').value);

    if ([eff, liters, distA, priceA, distB, priceB].some(v => isNaN(v) || v <= 0)) {
      alert('모든 값을 0보다 큰 숫자로 입력해주세요!');
      return;
    }

    // 주유 비용
    const fuelA = liters * priceA;
    const fuelB = liters * priceB;

    // 왕복 이동 시 소모 연료비 (해당 주유소 가격 기준으로 계산)
    const moveA = (distA * 2 / eff) * priceA;
    const moveB = (distB * 2 / eff) * priceB;

    const totalA = fuelA + moveA;
    const totalB = fuelB + moveB;

    const winner = totalA < totalB ? 'A' : 'B';
    const diff = Math.abs(totalA - totalB);

    const resultEl = document.getElementById('result');
    resultEl.className = 'result show winner-' + winner.toLowerCase();
    document.getElementById('resultWinner').textContent = '🅰️🅱️'[winner === 'A' ? 0 : 1] + ' ' + winner + ' 주유소';
    document.getElementById('savingsAmount').textContent = '약 ' + Math.round(diff).toLocaleString() + '원 이득';

    document.getElementById('breakdown').innerHTML = `
      <div class="breakdown-row"><span class="label">A 주유 비용</span><span class="value">${Math.round(fuelA).toLocaleString()}원</span></div>
      <div class="breakdown-row"><span class="label">A 왕복 이동 기름값</span><span class="value">${Math.round(moveA).toLocaleString()}원</span></div>
      <div class="breakdown-row"><span class="label">A 총비용</span><span class="value">${Math.round(totalA).toLocaleString()}원</span></div>
      <div class="breakdown-row"><span class="label">B 주유 비용</span><span class="value">${Math.round(fuelB).toLocaleString()}원</span></div>
      <div class="breakdown-row"><span class="label">B 왕복 이동 기름값</span><span class="value">${Math.round(moveB).toLocaleString()}원</span></div>
      <div class="breakdown-row"><span class="label">B 총비용</span><span class="value">${Math.round(totalB).toLocaleString()}원</span></div>
    `;
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // ===== OCR 기능 =====
  const ocrSection = document.getElementById('ocrSection');
  const fileInput = document.getElementById('fileInput');
  const ocrStatus = document.getElementById('ocrStatus');
  const ocrStatusText = document.getElementById('ocrStatusText');
  const progressFill = document.getElementById('progressFill');
  const stationsList = document.getElementById('stationsList');
  const stationsContainer = document.getElementById('stationsContainer');

  ocrSection.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', handleFile);

  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;

    ocrStatus.classList.add('show');
    stationsList.classList.remove('show');
    progressFill.style.width = '0%';
    ocrStatusText.textContent = '🔍 한글 인식 모델 로딩 중... (첫 사용 시 약 15MB 다운로드)';

    try {
      const result = await Tesseract.recognize(file, 'kor+eng', {
        logger: m => {
          if (m.status === 'recognizing text') {
            const pct = Math.round(m.progress * 100);
            progressFill.style.width = pct + '%';
            ocrStatusText.textContent = `📖 글자 분석 중... ${pct}%`;
          } else if (m.status === 'loading language traineddata') {
            ocrStatusText.textContent = '📦 한글 모델 다운로드 중...';
          }
        }
      });

      const text = result.data.text;
      console.log('OCR 결과:', text);
      const stations = parseStations(text);

      if (stations.length === 0) {
        ocrStatusText.textContent = '⚠️ 주유소 정보를 찾지 못했습니다. 더 선명한 스크린샷을 사용해주세요.';
        return;
      }

      ocrStatus.classList.remove('show');
      displayStations(stations);
    } catch (err) {
      console.error(err);
      ocrStatusText.textContent = '❌ 오류: ' + err.message;
    }
    fileInput.value = '';
  }

  // OCR 텍스트에서 거리/가격 추출
  function parseStations(text) {
    // 거리: 3.3km, 8.8km, 799m
    const distRegex = /(\d+(?:\.\d+)?)\s*(km|m)\b/gi;
    // 가격: 1,965 또는 1965 (4자리 숫자)
    const priceRegex = /(\d{1,2}[,，]?\d{3})/g;

    const distances = [];
    let match;
    while ((match = distRegex.exec(text)) !== null) {
      let val = parseFloat(match[1]);
      if (match[2].toLowerCase() === 'm') val = val / 1000;
      // 비현실적 거리 제외
      if (val > 0 && val < 100) distances.push({ value: val, index: match.index });
    }

    const prices = [];
    while ((match = priceRegex.exec(text)) !== null) {
      const val = parseInt(match[1].replace(/[,，]/g, ''));
      // 주유소 가격대(1,000원 ~ 3,500원)
      if (val >= 1000 && val <= 3500) prices.push({ value: val, index: match.index });
    }

    // 거리와 가격을 위치순으로 페어링
    const stations = [];
    const used = new Set();
    distances.forEach(d => {
      // 거리 뒤에 가장 가까이 나타나는 가격 찾기
      let bestPrice = null;
      let bestDist = Infinity;
      prices.forEach((p, i) => {
        if (used.has(i)) return;
        const gap = p.index - d.index;
        if (gap > 0 && gap < bestDist) {
          bestDist = gap;
          bestPrice = { ...p, _i: i };
        }
      });
      if (bestPrice) {
        used.add(bestPrice._i);
        stations.push({ distance: d.value, price: bestPrice.value });
      }
    });

    return stations;
  }

  let selection = []; // ['A', 'B'] 순서로 인덱스 저장
  let detectedStations = [];

  function displayStations(stations) {
    detectedStations = stations;
    selection = [];
    stationsContainer.innerHTML = '';
    stations.forEach((s, i) => {
      const item = document.createElement('div');
      item.className = 'station-item';
      item.dataset.index = i;
      item.innerHTML = `
        <div class="station-info">
          <div class="dist">📍 ${s.distance.toFixed(1)} km</div>
          <div class="price">⛽ ${s.price.toLocaleString()} 원</div>
        </div>
        <div class="station-tag" id="tag-${i}">선택</div>
      `;
      item.addEventListener('click', () => toggleStation(i));
      stationsContainer.appendChild(item);
    });
    stationsList.classList.add('show');
    stationsList.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function toggleStation(i) {
    const idx = selection.indexOf(i);
    if (idx >= 0) {
      selection.splice(idx, 1);
    } else {
      if (selection.length >= 2) selection.shift();
      selection.push(i);
    }
    updateStationUI();
  }

  function updateStationUI() {
    detectedStations.forEach((_, i) => {
      const item = stationsContainer.querySelector(`[data-index="${i}"]`);
      const tag = document.getElementById('tag-' + i);
      item.className = 'station-item';
      tag.className = 'station-tag';
      tag.textContent = '선택';
      const pos = selection.indexOf(i);
      if (pos === 0) {
        item.classList.add('selected-a');
        tag.classList.add('a');
        tag.textContent = 'A';
      } else if (pos === 1) {
        item.classList.add('selected-b');
        tag.classList.add('b');
        tag.textContent = 'B';
      }
    });

    if (selection.length === 2) {
      const a = detectedStations[selection[0]];
      const b = detectedStations[selection[1]];
      document.getElementById('distA').value = a.distance.toFixed(1);
      document.getElementById('priceA').value = a.price;
      document.getElementById('distB').value = b.distance.toFixed(1);
      document.getElementById('priceB').value = b.price;
      // 살짝 알림
      setTimeout(() => {
        document.querySelector('.calc-btn').scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  }
</script>
</body>
</html>
