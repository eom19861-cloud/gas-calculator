<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0ea5e9" />
<title>주유소 가성비 계산기</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    color: #f1f5f9;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }
  header {
    text-align: center;
    margin-bottom: 20px;
  }
  header h1 {
    font-size: 22px;
    margin: 0 0 6px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  header p {
    margin: 0;
    font-size: 13px;
    color: #94a3b8;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    backdrop-filter: blur(8px);
  }
  .card h2 {
    margin: 0 0 12px;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .badge {
    display: inline-block;
    width: 22px; height: 22px;
    line-height: 22px;
    border-radius: 50%;
    text-align: center;
    font-size: 12px;
    font-weight: 800;
    color: #fff;
  }
  .badge.a { background: #3b82f6; }
  .badge.b { background: #f59e0b; }
  .badge.car { background: #10b981; }
  .field {
    margin-bottom: 10px;
  }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 12px;
    color: #cbd5e1;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap input {
    width: 100%;
    padding: 13px 50px 13px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.25);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .input-wrap input:focus {
    border-color: #0ea5e9;
    background: rgba(14,165,233,0.08);
  }
  .input-wrap .unit {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: #94a3b8;
    pointer-events: none;
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .calc-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #0ea5e9, #2563eb);
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(14,165,233,0.35);
    margin-top: 6px;
    transition: transform 0.1s;
  }
  .calc-btn:active { transform: scale(0.98); }
  .reset-btn {
    width: 100%;
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    background: transparent;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 600;
    margin-top: 8px;
    cursor: pointer;
  }
  /* 결과 */
  #result { display: none; margin-top: 18px; }
  #result.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .winner {
    background: linear-gradient(135deg, #059669, #10b981);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin-bottom: 14px;
    box-shadow: 0 12px 30px rgba(16,185,129,0.3);
  }
  .winner .label {
    font-size: 13px;
    opacity: 0.9;
    margin-bottom: 6px;
  }
  .winner .name {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .winner .save {
    font-size: 15px;
    font-weight: 600;
    background: rgba(0,0,0,0.2);
    display: inline-block;
    padding: 6px 14px;
    border-radius: 999px;
    margin-top: 4px;
  }
  .compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .compare .box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px;
  }
  .compare .box.win {
    border-color: #10b981;
    background: rgba(16,185,129,0.1);
  }
  .compare .title {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 4px;
  }
  .compare .total {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .compare .row-detail {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #cbd5e1;
    padding: 3px 0;
  }
  .compare .row-detail b { color: #f1f5f9; font-weight: 600; }
  .note {
    font-size: 11px;
    color: #64748b;
    text-align: center;
    line-height: 1.5;
    padding: 0 4px;
  }
  .error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>⛽ 진짜 주유소 가성비 계산기</h1>
    <p>이동 기름값까지 포함해서 진짜 이득인 곳을 알려드려요</p>
  </header>

  <!-- 내 차 정보 -->
  <div class="card">
    <h2><span class="badge car">🚗</span> 내 차 정보</h2>
    <div class="row">
      <div class="field">
        <label>평균 연비</label>
        <div class="input-wrap">
          <input type="number" id="mileage" inputmode="decimal" placeholder="예: 12" value="12" step="0.1" />
          <span class="unit">km/L</span>
        </div>
      </div>
      <div class="field">
        <label>주유할 양</label>
        <div class="input-wrap">
          <input type="number" id="liters" inputmode="decimal" placeholder="예: 40" value="40" step="1" />
          <span class="unit">L</span>
        </div>
      </div>
    </div>
  </div>

  <!-- A 주유소 -->
  <div class="card">
    <h2><span class="badge a">A</span> A 주유소 (보통 더 싼 곳)</h2>
    <div class="row">
      <div class="field">
        <label>거리(편도)</label>
        <div class="input-wrap">
          <input type="number" id="distA" inputmode="decimal" placeholder="6.6" step="0.1" />
          <span class="unit">km</span>
        </div>
      </div>
      <div class="field">
        <label>리터당 가격</label>
        <div class="input-wrap">
          <input type="number" id="priceA" inputmode="numeric" placeholder="1955" step="1" />
          <span class="unit">원</span>
        </div>
      </div>
    </div>
  </div>

  <!-- B 주유소 -->
  <div class="card">
    <h2><span class="badge b">B</span> B 주유소 (조금 더 비싼 곳)</h2>
    <div class="row">
      <div class="field">
        <label>거리(편도)</label>
        <div class="input-wrap">
          <input type="number" id="distB" inputmode="decimal" placeholder="2.9" step="0.1" />
          <span class="unit">km</span>
        </div>
      </div>
      <div class="field">
        <label>리터당 가격</label>
        <div class="input-wrap">
          <input type="number" id="priceB" inputmode="numeric" placeholder="1956" step="1" />
          <span class="unit">원</span>
        </div>
      </div>
    </div>
  </div>

  <button class="calc-btn" onclick="calculate()">💰 어디가 더 이득인지 계산하기</button>
  <button class="reset-btn" onclick="resetForm()">초기화</button>

  <div id="result"></div>
</div>

<script>
  function num(id) {
    const v = parseFloat(document.getElementById(id).value);
    return isNaN(v) ? null : v;
  }

  function won(n) {
    return Math.round(n).toLocaleString('ko-KR') + '원';
  }

  function calculate() {
    const mileage = num('mileage');
    const liters = num('liters');
    const dA = num('distA');
    const pA = num('priceA');
    const dB = num('distB');
    const pB = num('priceB');

    const result = document.getElementById('result');

    if (!mileage || !liters || dA === null || !pA || dB === null || !pB) {
      result.className = 'show';
      result.innerHTML = '<div class="error">⚠️ 모든 값을 정확히 입력해 주세요.</div>';
      return;
    }
    if (mileage <= 0 || liters <= 0) {
      result.className = 'show';
      result.innerHTML = '<div class="error">⚠️ 연비와 주유량은 0보다 커야 해요.</div>';
      return;
    }

    // 핵심 계산: 이동 기름값 = (왕복 거리 / 연비) * 해당 주유소 단가
    // (가는 길/오는 길 모두 그 주유소에서 산 기름값으로 환산하는 것이 합리적 비교)
    const fuelA = liters * pA;
    const moveA = (dA * 2 / mileage) * pA;
    const totalA = fuelA + moveA;

    const fuelB = liters * pB;
    const moveB = (dB * 2 / mileage) * pB;
    const totalB = fuelB + moveB;

    const winner = totalA < totalB ? 'A' : 'B';
    const diff = Math.abs(totalA - totalB);

    let html = '';
    html += '<div class="winner">';
    html += '<div class="label">👑 더 이득인 주유소</div>';
    html += '<div class="name">' + winner + ' 주유소로 가세요!</div>';
    if (diff < 1) {
      html += '<div class="save">사실상 비용 차이 없음</div>';
    } else {
      html += '<div class="save">' + won(diff) + ' 더 절약</div>';
    }
    html += '</div>';

    html += '<div class="compare">';
    // A
    html += '<div class="box ' + (winner === 'A' ? 'win' : '') + '">';
    html += '<div class="title">A 주유소 총비용</div>';
    html += '<div class="total">' + won(totalA) + '</div>';
    html += '<div class="row-detail"><span>주유비</span><b>' + won(fuelA) + '</b></div>';
    html += '<div class="row-detail"><span>이동 기름값</span><b>' + won(moveA) + '</b></div>';
    html += '<div class="row-detail"><span>왕복</span><b>' + (dA*2).toFixed(1) + 'km</b></div>';
    html += '</div>';
    // B
    html += '<div class="box ' + (winner === 'B' ? 'win' : '') + '">';
    html += '<div class="title">B 주유소 총비용</div>';
    html += '<div class="total">' + won(totalB) + '</div>';
    html += '<div class="row-detail"><span>주유비</span><b>' + won(fuelB) + '</b></div>';
    html += '<div class="row-detail"><span>이동 기름값</span><b>' + won(moveB) + '</b></div>';
    html += '<div class="row-detail"><span>왕복</span><b>' + (dB*2).toFixed(1) + 'km</b></div>';
    html += '</div>';
    html += '</div>';

    html += '<div class="note">※ 이동 기름값 = (왕복거리 ÷ 내 차 연비) × 리터당 가격<br/>신호대기·정체 등은 반영되지 않은 단순 계산입니다.</div>';

    result.className = 'show';
    result.innerHTML = html;
    setTimeout(() => { result.scrollIntoView({behavior: 'smooth', block: 'start'}); }, 100);
  }

  function resetForm() {
    ['distA','priceA','distB','priceB'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('result').className = '';
    document.getElementById('result').innerHTML = '';
    window.scrollTo({top: 0, behavior: 'smooth'});
  }
</script>
</body>
</html>
